<h1>Ajouter un client PDP</h1>

<form method="POST">
    <p>Nom client :</p>
    <input type="text" name="nom" required>

    <p>SIRET :</p>
    <input type="text" name="siret" required>

    <p>TVA intracommunautaire :</p>
    <input type="text" name="tva_intracom">

    <p>Email :</p>
    <input type="email" name="email">

    <p>Canal :</p>
    <select name="canal">
        <option value="PDP_INTERNE">PDP interne</option>
        <option value="CHORUS_PRO_READY">Chorus Pro ready</option>
        <option value="PEPPOL_READY">Peppol ready</option>
    </select>

    <br><br>

    <button type="submit">Ajouter</button>
</form>

<a href="/ecritures/annuaire-pdp">Retour annuaire</a>
