<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Immobilisations — ComptaPilot V3</title>
<link rel="stylesheet" href="/static/v3/css/cockpit-premium.css">
<style>
body{margin:0;background:#07111f;color:white;font-family:Arial;padding:34px}
a{color:#38bdf8;text-decoration:none;font-weight:bold}
table{width:100%;border-collapse:collapse;background:#0f1f35;border-radius:18px;overflow:hidden}
th,td{padding:14px;border-bottom:1px solid #223b5c;text-align:left}
th{background:#102a43;color:#bfdbfe}
</style>
</head>
<body>
<a href="/">← Retour cockpit</a>
<h1>Immobilisations</h1>
<table>
<tr><th>Désignation</th><th>Date acquisition</th><th>Valeur origine</th><th>Durée</th><th>Amortissement annuel</th></tr>
{% for i in immobilisations %}
<tr>
<td>{{ i.designation }}</td>
<td>{{ i.date_acquisition or "—" }}</td>
<td>{{ i.valeur_origine }}</td>
<td>{{ i.duree_amortissement }} ans</td>
<td>{{ i.amortissement_annuel }}</td>
</tr>
{% endfor %}
</table>
</body>
</html>
