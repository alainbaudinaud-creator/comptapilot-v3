<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Collaboration SaaS avancée</title>

    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f5f7fa; color: #1e293b; }
        h1 { color: #1e3a5f; }
        .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        .actions a { background: #1e3a5f; color: white; padding: 10px 14px; border-radius: 8px; text-decoration: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 18px; }
        .card { background: white; padding: 20px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .badge { display: inline-block; padding: 6px 10px; border-radius: 999px; background: #e2e8f0; }
    </style>
</head>
<body>

<h1>Collaboration SaaS avancée</h1>

<div class="actions">
    <a href="/ecritures/commentaires-ecritures">Commentaires</a>
    <a href="/ecritures/demandes-correction">Demandes correction</a>
    <a href="/ecritures/coffre-fort">Coffre-fort</a>
    <a href="/ecritures/cloture-mensuelle">Clôture mensuelle</a>
    <a href="/ecritures/api/collaboration-saas">API Collaboration</a>
    <a href="/ecritures/dashboard-financier">Dashboard</a>
</div>

<div class="grid">
    {% for module in modules %}
        <div class="card">
            <h3>{{ module.nom }}</h3>
            <p>{{ module.statut }}</p>
            <span class="badge">Activable</span>
        </div>
    {% endfor %}
</div>

</body>
</html>
