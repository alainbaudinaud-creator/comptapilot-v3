<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>OCR IA Réel V3</title>
    <style>
        body { margin:0; background:#020617; color:#e5e7eb; font-family:Arial,sans-serif; }
        .page { padding:32px; }
        .hero { background:linear-gradient(135deg,#111827,#0f766e); padding:30px; border-radius:24px; margin-bottom:24px; }
        .card { background:#0f172a; border:1px solid #334155; border-radius:18px; padding:22px; margin-top:18px; }
        button { background:#0f766e; color:white; border:0; padding:12px 16px; border-radius:12px; font-weight:bold; }
        pre { white-space:pre-wrap; line-height:1.6; }
        a { color:#99f6e4; }
    </style>
</head>
<body>
<main class="page">
    <section class="hero">
        <h1>OCR IA Réel V3</h1>
        <p>Upload pièce → extraction texte → analyse facture → comptes comptables → écriture équilibrée.</p>
    </section>

    <form class="card" method="POST" enctype="multipart/form-data">
        <h2>Importer une facture</h2>
        <input type="file" name="piece" required>
        <br><br>
        <button type="submit">Analyser et générer l’écriture</button>
    </form>

    {% if resultat %}
    <section class="card">
        <h2>Résultat</h2>
        <pre>{{ resultat }}</pre>
    </section>
    {% endif %}

    <p style="margin-top:28px;"><a href="/">← Retour accueil</a></p>
</main>
</body>
</html>
