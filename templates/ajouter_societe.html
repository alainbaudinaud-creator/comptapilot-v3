<h1>Ajouter une société</h1>

<form method="POST">
    <p>Nom :</p>
    <input type="text" name="nom" required>

    <p>SIRET :</p>
    <input type="text" name="siret">

    <p>Adresse :</p>
    <textarea name="adresse"></textarea>

    <br><br>

    <button type="submit">Ajouter la société</button>
</form>

<a href="/ecritures/multi-societes">Retour multi-sociétés</a>
