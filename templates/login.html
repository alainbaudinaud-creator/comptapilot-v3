<!doctype html>
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>ComptaPilot V3 - Login</title>
  <style>
    body{margin:0;min-height:100vh;background:linear-gradient(135deg,#101b3a,#071421);font-family:Arial,sans-serif;color:white;display:flex;align-items:center;justify-content:center}
    .card{width:430px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:26px;padding:42px;box-shadow:0 30px 80px rgba(0,0,0,.35)}
    h1{font-size:42px;margin:0 0 16px}.cyan{color:#00d4ff}p{color:#aeb8cc;line-height:1.5}
    input{width:100%;box-sizing:border-box;margin:22px 0;padding:18px 20px;border-radius:16px;border:1px solid rgba(255,255,255,.12);background:#1b2437;color:white;font-size:16px}
    button{width:100%;padding:18px;border:0;border-radius:16px;background:linear-gradient(90deg,#4d83ff,#00d4ff);color:white;font-size:17px;font-weight:700;cursor:pointer}
    .foot{text-align:center;margin-top:28px;color:#9aa7bd;font-size:13px}
  </style>
</head>
<body>
  <form class="card" method="POST" action="/login">
    <h1>Compta<span class="cyan">Pilot</span></h1>
    <p>Plateforme comptable intelligente nouvelle génération.<br>Pilotage cabinet, automatisation et IA métier.</p>
    <input type="email" name="email" value="admin@comptapilot.local" required>
    <button type="submit">Accéder au cockpit V3</button>
    <div class="foot">ComptaPilot V3 • Cabinet augmenté IA</div>
  </form>
</body>
</html>
