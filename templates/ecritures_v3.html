<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Écritures V3</title>

<style>

body{
    background:#050816;
    color:white;
    font-family:Arial;
    padding:40px;
}

h1{
    font-size:42px;
}

.card{
    background:#11182d;
    padding:25px;
    border-radius:18px;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border-radius:12px;
    border:none;
    background:#1a2340;
    color:white;
}

button{
    padding:14px 22px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#4f7cff,#22d3ee);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:14px;
    border-bottom:1px solid #24304f;
}

th{
    text-align:left;
    color:#8fa3c7;
}

</style>
</head>

<body>

<h1>Écritures Comptables V3</h1>

<div class="card">

<form method="POST" action="/ecritures/ajouter">

<input name="journal" placeholder="Journal">
<input name="compte" placeholder="Compte">
<input name="libelle" placeholder="Libellé">
<input name="debit" placeholder="Débit">
<input name="credit" placeholder="Crédit">

<button type="submit">
Ajouter l'écriture
</button>

</form>

</div>

<div class="card">

<table>

<tr>
<th>ID</th>
<th>Journal</th>
<th>Compte</th>
<th>Libellé</th>
<th>Débit</th>
<th>Crédit</th>
<th>Date</th>
</tr>

{% for e in ecritures %}

<tr>
<td>{{ e[0] }}</td>
<td>{{ e[1] }}</td>
<td>{{ e[2] }}</td>
<td>{{ e[3] }}</td>
<td>{{ e[4] }}</td>
<td>{{ e[5] }}</td>
<td>{{ e[6] }}</td>
</tr>

{% endfor %}

</table>

</div>

</body>
</html>
