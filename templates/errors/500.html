<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Erreur application</title>

    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            padding:40px;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:8px;
            max-width:700px;
            margin:auto;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        h1{
            color:#c0392b;
        }

        p{
            font-size:16px;
        }
    </style>
</head>
<body>

<div class="box">

    <h1>Une erreur est survenue</h1>

    <p>
        L'opération n'a pas pu être exécutée.
    </p>

    <p>
        Merci de réessayer ou de contacter l’administrateur.
    </p>

</div>

</body>
</html>
