<h1>Grand Livre Professionnel</h1>

<table border="1" cellpadding="6">
<tr>
<th>Compte</th>
<th>Libellé compte</th>
<th>Date</th>
<th>Pièce</th>
<th>Libellé</th>
<th>Débit</th>
<th>Crédit</th>
</tr>

{% for e in ecritures %}
<tr>
<td>{{ e[0] }}</td>
<td>{{ e[1] }}</td>
<td>{{ e[2] }}</td>
<td>{{ e[3] }}</td>
<td>{{ e[4] }}</td>
<td>{{ e[5] }}</td>
<td>{{ e[6] }}</td>
</tr>
{% endfor %}
</table>
