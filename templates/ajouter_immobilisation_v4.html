<h1>Ajouter une immobilisation</h1>
<form method="POST">
<p>Nom :</p><input type="text" name="nom" required>
<p>Valeur :</p><input type="text" name="valeur" required>
<p>Durée en années :</p><input type="text" name="duree" value="5">
<p>Date acquisition :</p><input type="date" name="date_acquisition">
<p>Compte :</p><input type="text" name="compte" value="218">
<br><br>
<button type="submit">Ajouter</button>
</form>
<a href="/ecritures/immobilisations-v4">Retour immobilisations</a>
