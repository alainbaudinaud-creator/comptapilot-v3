{% extends "base.html" %}

{% block content %}

<h1>Modifier une écriture</h1>

<form method="POST" action="/ecritures/update/{{ ecriture[0] }}" class="mt-4">

    <div class="mb-3">
        <label>Date</label>
        <input type="date" name="date_ecriture" class="form-control" value="{{ ecriture[1] }}">
    </div>

    <div class="mb-3">
        <label>Pièce</label>
        <input type="text" name="piece" class="form-control" value="{{ ecriture[2] }}">
    </div>

    <div class="mb-3">
        <label>Libellé</label>
        <input type="text" name="libelle" class="form-control" value="{{ ecriture[3] }}">
    </div>

    <div class="mb-3">
        <label>Débit</label>
        <input type="number" step="0.01" name="debit" class="form-control" value="{{ ecriture[4] }}">
    </div>

    <div class="mb-3">
        <label>Crédit</label>
        <input type="number" step="0.01" name="credit" class="form-control" value="{{ ecriture[5] }}">
    </div>

    <button type="submit" class="btn btn-primary">Enregistrer</button>

    <a href="/ecritures/" class="btn btn-secondary">Annuler</a>

</form>

{% endblock %}
