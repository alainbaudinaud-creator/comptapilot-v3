<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Centre SaaS ComptaPilot</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f5f7fa;
            color: #1e293b;
        }

        h1 {
            color: #1e3a5f;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h3 {
            margin-top: 0;
            color: #1e3a5f;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: #e2e8f0;
            margin-top: 8px;
            font-size: 13px;
        }

        .actions {
            margin-bottom: 25px;
        }

        .actions a {
            display: inline-block;
            background: #1e3a5f;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            text-decoration: none;
            margin-right: 8px;
        }

        @media (max-width: 700px) {
            body {
                margin: 15px;
            }
        }
    </style>
</head>

<body>

    <h1>Centre SaaS ComptaPilot</h1>

    <p class="subtitle">
        Vue produit : sécurité, API, reporting, IA, fiscalité, cloud et préparation production.
    </p>

    <div class="actions">
        <a href="/ecritures/dashboard-financier">Dashboard financier</a>
        <a href="/ecritures/api/dashboard-financier">API JSON</a>
        <a href="#" onclick="window.print(); return false;">Exporter PDF</a>
    </div>

    <div class="grid">

        {% for module in modules %}
            <div class="card">
                <h3>{{ module.nom }}</h3>
                <p><strong>Statut :</strong> {{ module.statut }}</p>
                <span class="badge">{{ module.niveau }}</span>
            </div>
        {% endfor %}

    </div>

</body>
</html>
