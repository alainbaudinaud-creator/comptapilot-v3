<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <title>Saisie rapide - ComptaPilot V3</title>
    <link rel="stylesheet" href="/static/css/comptapilot.css">
    <link rel="stylesheet" href="/static/css/erp_premium.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-logo">CP</div>
            <div>
                <div class="brand-name">ComptaPilot</div>
                <div class="brand-subtitle">ERP comptable intelligent</div>
            </div>
        </div>
        <nav class="nav-section">
            <a href="/">Dashboard</a>
            <a href="/ecritures/saisie-rapide">Saisie rapide</a>
            <a href="/societe/ui">Sociétés clientes</a>
            <a href="/ecritures/operationnel/plan-comptable">Plan comptable</a>
            <a href="/ecritures/dashboard-financier">Cockpit financier</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <div>
                <h1>Saisie rapide</h1>
                <p>Création rapide d'écritures comptables</p>
            </div>
        </header>

        <section class="cards-grid">
            <div class="card">
                <h2>Nouvelle écriture</h2>
                <form method="post" action="/public-api/ecritures">
                    <label>Date</label><br>
                    <input name="date_ecriture" type="date"><br><br>

                    <label>Journal</label><br>
                    <input name="journal" value="OD"><br><br>

                    <label>Compte</label><br>
                    <input name="compte" placeholder="Ex : 606000"><br><br>

                    <label>Libellé</label><br>
                    <input name="libelle" placeholder="Libellé de l'écriture"><br><br>

                    <label>Débit</label><br>
                    <input name="debit" type="number" step="0.01" value="0"><br><br>

                    <label>Crédit</label><br>
                    <input name="credit" type="number" step="0.01" value="0"><br><br>

                    <button type="submit">Enregistrer</button>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
