<h1>Limites d'usage V6</h1>

<table border="1" cellpadding="8">
<tr><th>Usage</th><th>Utilisé</th><th>Limite</th><th>Statut</th></tr>
{% for l in limites %}
<tr>
    <td>{{ l[0] }}</td>
    <td>{{ l[1] }}</td>
    <td>{{ l[2] }}</td>
    <td>{% if l[1] > l[2] %}DÉPASSÉ{% else %}OK{% endif %}</td>
</tr>
{% endfor %}
</table>
