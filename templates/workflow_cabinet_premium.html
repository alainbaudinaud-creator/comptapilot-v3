<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>Workflow Cabinet — ComptaPilot V3</title>
<link rel="stylesheet" href="/static/v3/css/cockpit-premium.css">
<style>
body{margin:0;background:#07111f;color:white;font-family:Arial;padding:34px}
a{color:#38bdf8;text-decoration:none;font-weight:bold}
table{width:100%;border-collapse:collapse;background:#0f1f35;border-radius:18px;overflow:hidden}
th,td{padding:14px;border-bottom:1px solid #223b5c;text-align:left}
th{background:#102a43;color:#bfdbfe}
.pill{border:1px solid #2563eb;background:#102a43;border-radius:999px;padding:6px 10px;color:#bfdbfe}
</style>
</head>
<body>
<a href="/">← Retour cockpit</a>
<h1>Workflow Cabinet</h1>
<table>
<tr><th>Tâche</th><th>Module</th><th>Statut</th><th>Priorité</th><th>Assigné à</th><th>Échéance</th></tr>
{% for t in taches %}
<tr>
<td>{{ t.titre }}</td>
<td>{{ t.module }}</td>
<td><span class="pill">{{ t.statut }}</span></td>
<td>{{ t.priorite }}</td>
<td>{{ t.assigne_a or "Non assigné" }}</td>
<td>{{ t.echeance or "—" }}</td>
</tr>
{% endfor %}
</table>
</body>
</html>
