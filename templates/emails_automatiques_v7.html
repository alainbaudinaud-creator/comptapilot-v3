<h1>Emails automatiques V7</h1>

<table border="1" cellpadding="8">
<tr><th>ID</th><th>Destinataire</th><th>Sujet</th><th>Message</th><th>Statut</th><th>Date</th></tr>
{% for e in emails %}

{% endfor %}
</table>
