<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Contrôle FEC</title>

    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background:#f5f7fa;
            color:#1e293b;
        }

        h1 {
            color:#1e3a5f;
        }

        .grid {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
            gap:20px;
            margin-bottom:30px;
        }

        .card {
            background:white;
            padding:20px;
            border-radius:14px;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
        }

        .value {
            font-size:30px;
            font-weight:bold;
            margin-top:10px;
        }

        .green { color:#16a34a; }
        .red { color:#dc2626; }

        .box {
            background:white;
            padding:20px;
            border-radius:14px;
            box-shadow:0 2px 8px rgba(0,0,0,.08);
        }

        li {
            margin-bottom:8px;
        }
    </style>
</head>

<body>

<h1>Contrôle FEC</h1>

<div class="grid">

    <div class="card">
        <div>Total débit</div>
        <div class="value">{{ total_debit }} €</div>
    </div>

    <div class="card">
        <div>Total crédit</div>
        <div class="value">{{ total_credit }} €</div>
    </div>

    <div class="card">
        <div>Écart</div>
        <div class="value {% if ecart != 0 %}red{% else %}green{% endif %}">
            {{ ecart }} €
        </div>
    </div>

    <div class="card">
        <div>Nombre d'écritures</div>
        <div class="value">{{ nb_lignes }}</div>
    </div>

</div>

<div class="box">

    <h2>Anomalies détectées</h2>

    {% if anomalies %}
        <ul>
            {% for a in anomalies %}
                <li>{{ a }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p class="green">Aucune anomalie détectée.</p>
    {% endif %}

</div>

</body>
</html>
