version: "3.9"

services:

  comptapilot:

    build:
      context: .

    ports:
      - "5001:5000"

    environment:
      POSTGRES_DB: comptapilot
      POSTGRES_USER: comptapilot
      POSTGRES_PASSWORD: comptapilot
      REDIS_URL: redis://redis:6379/0

    depends_on:
      - postgres
      - redis

  celery_worker:

    build:
      context: .

    command: python -u workers/celery/worker.py

    environment:
      REDIS_URL: redis://redis:6379/0

    depends_on:
      - redis
      - postgres

  redis:

    image: redis:7-alpine

    ports:
      - "6379:6379"

  postgres:

    image: postgres:16-alpine

    environment:
      POSTGRES_DB: comptapilot
      POSTGRES_USER: comptapilot
      POSTGRES_PASSWORD: comptapilot

    ports:
      - "5432:5432"

  prometheus:

    image: prom/prometheus

    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

    ports:
      - "9090:9090"

  grafana:

    image: grafana/grafana

    ports:
      - "3000:3000"

    depends_on:
      - prometheus
