apiVersion: apps/v1
kind: Deployment

metadata:
  name: comptapilot-v3

spec:

  replicas: 2

  selector:
    matchLabels:
      app: comptapilot

  template:

    metadata:
      labels:
        app: comptapilot

    spec:

      containers:

        - name: comptapilot

          image: comptapilot-v3:latest

          ports:
            - containerPort: 5000

          env:

            - name: REDIS_URL
              value: redis://redis:6379/0

            - name: POSTGRES_DB
              value: comptapilot

            - name: POSTGRES_USER
              value: comptapilot

            - name: POSTGRES_PASSWORD
              value: comptapilot
