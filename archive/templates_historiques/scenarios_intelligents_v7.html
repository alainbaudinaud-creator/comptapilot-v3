<h1>Scénarios intelligents V7</h1>

<form method="POST">
    <p>Nom :</p>
    <input type="text" name="nom" required>

    <p>Condition déclenchement :</p>
    <input type="text" name="condition_declenchement" required>

    <p>Action :</p>
    <input type="text" name="action" required>

    <br><br>

    <button type="submit">Ajouter scénario</button>
</form>

<table border="1" cellpadding="8">
<tr><th>ID</th><th>Nom</th><th>Condition</th><th>Action</th><th>Statut</th><th>Date</th></tr>
{% for s in scenarios %}
<tr><td>{{ s[0] }}</td><td>{{ s[1] }}</td><td>{{ s[2] }}</td><td>{{ s[3] }}</td><td>{{ s[4] }}</td><td>{{ s[5] }}</td></tr>
{% endfor %}
</table>

<a href="/ecritures/orchestration-ia-v7">Retour V7</a>
