<h1>Journal technique PDP v2</h1>

<table border="1" cellpadding="8">
<tr>
    <th>ID</th>
    <th>Type</th>
    <th>Référence</th>
    <th>Message</th>
    <th>Empreinte SHA-256</th>
    <th>Date</th>
</tr>

{% for l in logs %}
<tr>
    <td>{{ l[0] }}</td>
    <td>{{ l[1] }}</td>
    <td>{{ l[2] }}</td>
    <td>{{ l[3] }}</td>
    <td><small>{{ l[4] }}</small></td>
    <td>{{ l[5] }}</td>
</tr>
{% endfor %}
</table>

<a href="/ecritures/pdp-ready">Retour PDP</a>
