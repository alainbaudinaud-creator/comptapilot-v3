<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Rapprochement bancaire — ComptaPilot V3</title>
  <link rel="stylesheet" href="/refonte-static/css/cockpit_premium.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand"><div class="logo">CP</div><div><strong>ComptaPilot V3</strong><span>Banque</span></div></div>
    <nav>
      <a href="/refonte/">Cockpit</a>
      <a href="/refonte/journal">Journal</a>
      <a href="/refonte/grand-livre">Grand Livre</a>
      <a href="/refonte/balance">Balance</a>
      <a class="active" href="/refonte/rapprochement-bancaire">Rapprochement bancaire</a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <p class="eyebrow">Trésorerie</p>
        <h1>Rapprochement bancaire automatique</h1>
      </div>
      <div class="status"><span></span><strong id="total">0</strong>&nbsp;propositions</div>
    </header>

    <section class="table-card">
      <table>
        <thead>
          <tr>
            <th>Opération bancaire</th>
            <th>Écriture proposée</th>
            <th>Score</th>
            <th>Statut</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
</div>

<script>
function fmt(v){ return Number(v||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

async function charger(){
  const res = await fetch('/refonte/api/refonte/banque/propositions');
  const data = await res.json();
  document.getElementById('total').textContent = data.total;

  document.getElementById('rows').innerHTML = data.propositions.map(p => {
    const op = p.operation || {};
    const e = p.ecriture || null;

    return `
      <tr>
        <td>
          <strong>${op.libelle || ''}</strong><br>
          ${op.date_operation || ''}<br>
          Montant : ${fmt(op.montant)}
        </td>
        <td>
          ${e ? `
            <strong>${e.piece || ''}</strong><br>
            ${e.libelle || ''}<br>
            Compte ${e.compte} — Débit ${fmt(e.debit)} / Crédit ${fmt(e.credit)}
          ` : 'Aucune écriture proposée'}
        </td>
        <td>${p.score}%</td>
        <td>${p.statut}</td>
        <td>
          ${e ? `<button onclick="valider(${op.id}, ${e.ecriture_id}, ${p.score})">Valider</button>` : ''}
        </td>
      </tr>
    `;
  }).join('');
}

async function valider(operation_id, ecriture_id, score){
  const res = await fetch('/refonte/api/refonte/banque/valider-rapprochement', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({operation_id, ecriture_id, score})
  });

  const data = await res.json();
  if(!data.success){
    alert(data.error || 'Erreur');
    return;
  }

  alert('Rapprochement validé');
  charger();
}

charger();
</script>
</body>
</html>
