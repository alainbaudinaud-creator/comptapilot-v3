<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Bilan — ComptaPilot V3</title>
  <link rel="stylesheet" href="/refonte-static/css/cockpit_premium.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand"><div class="logo">CP</div><div><strong>ComptaPilot V3</strong><span>Bilan</span></div></div>
    <nav>
      <a href="/refonte/">Cockpit</a>
      <a href="/refonte/balance">Balance</a>
      <a href="/refonte/grand-livre">Grand Livre</a>
      <a href="/refonte/journal">Journal</a>
      <a href="/refonte/compte-resultat">Compte de résultat</a>
      <a class="active" href="/refonte/bilan">Bilan</a>
    </nav>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <p class="eyebrow">Reporting financier</p>
        <h1>Bilan comptable</h1>
      </div>
      <div class="status"><span></span><strong id="equilibre">-</strong></div>
    </header>

    <section class="metrics">
      <article><span>Total actif</span><strong id="totalActif">0</strong><em>Débits nets</em></article>
      <article><span>Total passif</span><strong id="totalPassif">0</strong><em>Crédits nets</em></article>
      <article><span>Équilibre</span><strong id="etat">-</strong><em>Actif = Passif</em></article>
    </section>

    <section class="table-card">
      <h2>Actif</h2>
      <table><thead><tr><th>Compte</th><th>Libellé</th><th>Montant</th></tr></thead><tbody id="rowsActif"></tbody></table>
    </section>

    <section class="table-card">
      <h2>Passif</h2>
      <table><thead><tr><th>Compte</th><th>Libellé</th><th>Montant</th></tr></thead><tbody id="rowsPassif"></tbody></table>
    </section>
  </main>
</div>

<script>
function fmt(v){ return Number(v||0).toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

fetch('/refonte/api/refonte/bilan')
.then(r=>r.json())
.then(data=>{
  document.getElementById('totalActif').textContent = fmt(data.total_actif);
  document.getElementById('totalPassif').textContent = fmt(data.total_passif);
  document.getElementById('etat').textContent = data.equilibre ? 'OK' : 'À contrôler';
  document.getElementById('equilibre').textContent = data.equilibre ? 'Équilibré' : 'Déséquilibré';

  document.getElementById('rowsActif').innerHTML = data.actif.map(x=>`
    <tr><td><strong>${x.compte}</strong></td><td>${x.libelle}</td><td>${fmt(x.solde)}</td></tr>
  `).join('');

  document.getElementById('rowsPassif').innerHTML = data.passif.map(x=>`
    <tr><td><strong>${x.compte}</strong></td><td>${x.libelle}</td><td>${fmt(x.solde)}</td></tr>
  `).join('');
});
</script>
</body>
</html>
