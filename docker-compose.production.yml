version: "3.9"

services:

  nginx:

    image: nginx:stable-alpine

    ports:
      - "80:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - comptapilot

  comptapilot:

    build:
      context: .

    ports:
      - "5001:5000"

    environment:

      FLASK_ENV: production

      POSTGRES_DB: comptapilot
      POSTGRES_USER: comptapilot
      POSTGRES_PASSWORD: comptapilot

      REDIS_URL: redis://redis:6379/0

      JWT_SECRET_KEY: SUPER_SECRET_V3

      OPENAI_API_KEY: CHANGE_ME

    depends_on:
      - postgres
      - redis

  redis:

    image: redis:7-alpine

  postgres:

    image: postgres:16-alpine

    environment:

      POSTGRES_DB: comptapilot
      POSTGRES_USER: comptapilot
      POSTGRES_PASSWORD: comptapilot
