version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: comptapilot_postgres_prod
    restart: always

    environment:
      POSTGRES_DB: comptapilot
      POSTGRES_USER: comptapilot
      POSTGRES_PASSWORD: CHANGE_ME_SUPER_PASSWORD

    volumes:
      - ./production/postgres:/var/lib/postgresql/data

    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: comptapilot_redis_prod
    restart: always

    volumes:
      - ./production/redis:/data

    ports:
      - "6379:6379"

  backend:
    build:
      context: .

    container_name: comptapilot_backend_prod

    restart: always

    depends_on:
      - postgres
      - redis

    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://comptapilot:CHANGE_ME_SUPER_PASSWORD@postgres:5432/comptapilot
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: CHANGE_ME
      JWT_SECRET_KEY: CHANGE_ME
      SECRET_KEY: CHANGE_ME

    ports:
      - "5000:5000"

  nginx:
    image: nginx:latest
    container_name: comptapilot_nginx_prod

    restart: always

    depends_on:
      - backend

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    ports:
      - "80:80"
      - "443:443"

