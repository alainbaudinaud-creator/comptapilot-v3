services:
  comptapilot:
    build: .
    env_file:
      - .env.v3
    ports:
      - "5001:5000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    env_file:
      - .env.v3
    environment:
      POSTGRES_USER: comptapilot
      POSTGRES_PASSWORD: comptapilot
      POSTGRES_DB: comptapilot
    ports:
      - "5433:5432"
